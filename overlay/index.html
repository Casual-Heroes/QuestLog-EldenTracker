<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mortality Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    width: 300px;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }

  .panel {
    background: rgba(9, 9, 15, 0.95);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    overflow: hidden;
    backdrop-filter: blur(12px);
  }

  /* ── Header ── */
  .header {
    background: rgba(15,16,24,0.98);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .header-icon { color: #c9a84c; font-size: 10px; }
  .header-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f1f0f5;
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 3px 8px;
    font-size: 9px;
    color: #6b7280;
    letter-spacing: 1px;
  }
  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #374151;
  }
  .status-dot.active {
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e88;
  }

  /* ── Death count hero ── */
  .death-hero {
    padding: 16px 14px 12px;
    text-align: center;
    position: relative;
  }
  .death-number {
    font-size: 56px;
    font-weight: 800;
    line-height: 1;
    color: #f1f0f5;
    font-variant-numeric: tabular-nums;
    letter-spacing: -2px;
  }
  .death-number.has-deaths { color: #e8c45a; }
  .death-sublabel {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 3px;
    color: #374151;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── Stat cards row ── */
  .stat-cards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: rgba(255,255,255,0.04);
    margin: 0 14px 14px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .stat-card {
    background: rgba(15,16,24,0.8);
    padding: 10px 8px;
    text-align: center;
  }
  .stat-value {
    font-size: 16px;
    font-weight: 700;
    color: #f1f0f5;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .stat-label {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: #374151;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── Rage section ── */
  .rage-section {
    margin: 0 14px 14px;
  }
  .rage-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .rage-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: #374151;
    text-transform: uppercase;
  }
  .rage-state {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    transition: color 0.4s ease;
  }
  .rage-track {
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .rage-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease, background-color 0.5s ease;
  }

  /* ── Hollow badge ── */
  .hollow-badge {
    display: none;
    margin: 0 14px 14px;
    background: rgba(139,0,0,0.15);
    border: 1px solid rgba(139,0,0,0.4);
    border-radius: 6px;
    padding: 6px 10px;
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #ef4444;
  }
  @keyframes hollow-pulse {
    0%,100% { border-color: rgba(139,0,0,0.4); background: rgba(139,0,0,0.15); }
    50%      { border-color: rgba(239,68,68,0.6); background: rgba(139,0,0,0.25); }
  }
  .hollow-badge.visible {
    display: block;
    animation: hollow-pulse 1.6s ease-in-out infinite;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: rgba(255,255,255,0.04);
    margin: 0 0 14px;
  }

  /* ── Boss section ── */
  .boss-section { margin: 0 14px 14px; }
  .boss-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .boss-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: #374151;
    text-transform: uppercase;
  }
  .boss-count {
    font-size: 11px;
    font-weight: 700;
    color: #c9a84c;
  }
  .boss-track {
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .boss-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, #c9a84c, #e8c45a);
    transition: width 0.6s ease;
  }

  /* ── Boss mode content ── */
  .boss-recent { margin-top: 8px; }
  .recent-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
    font-size: 10px;
    color: #22c55e;
  }
  .recent-item::before {
    content: '';
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
  }
  .no-kills { font-size: 10px; color: #374151; padding: 4px 0; }

  .boss-full { margin-top: 8px; max-height: 180px; overflow-y: auto; }
  .boss-full::-webkit-scrollbar { width: 2px; }
  .boss-full::-webkit-scrollbar-thumb { background: #1e1f2e; }
  .region-hdr {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 2px;
    color: #374151;
    text-transform: uppercase;
    padding: 6px 0 3px;
  }
  .boss-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 0;
    font-size: 10px;
  }
  .boss-item.defeated { color: #22c55e; }
  .boss-item.alive { color: #6b7280; }
  .boss-tick { font-size: 9px; opacity: 0.7; }

  /* ── Mode cycle button ── */
  .mode-btn {
    display: block;
    width: 100%;
    margin-top: 8px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 4px;
    color: #374151;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 2px;
    padding: 5px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s ease;
  }
  .mode-btn:hover { border-color: rgba(201,168,76,0.3); color: #6b7280; }

  /* ── Footer ── */
  .footer {
    background: rgba(15,16,24,0.98);
    border-top: 1px solid rgba(255,255,255,0.04);
    padding: 8px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: #374151;
    text-transform: uppercase;
  }
  .footer-value {
    font-size: 13px;
    font-weight: 700;
    color: #6b7280;
    font-variant-numeric: tabular-nums;
  }

  /* ── Hollow panel state ── */
  @keyframes panel-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(139,0,0,0); }
    50%      { box-shadow: 0 0 20px 2px rgba(139,0,0,0.25); }
  }
  .panel.hollow {
    border-color: rgba(139,0,0,0.4);
    animation: panel-pulse 1.6s ease-in-out infinite;
  }
</style>
</head>
<body>
<div class="panel" id="panel">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="header-icon">✦</span>
      <span class="header-title">Mortality Monitor</span>
    </div>
    <div class="status-pill">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">OFFLINE</span>
    </div>
  </div>

  <!-- Death hero -->
  <div class="death-hero">
    <div class="death-number" id="session-deaths">0</div>
    <div class="death-sublabel">Session Deaths</div>
  </div>

  <!-- Stat cards -->
  <div class="stat-cards">
    <div class="stat-card">
      <div class="stat-value" id="dph">0.0</div>
      <div class="stat-label">Deaths / Boss</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="timer">00:00:00</div>
      <div class="stat-label">Session Time</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="rage-pct-val">0%</div>
      <div class="stat-label">Rage Index</div>
    </div>
  </div>

  <!-- Rage bar -->
  <div class="rage-section">
    <div class="rage-row">
      <span class="rage-label" id="rage-label">Rage Index</span>
      <span class="rage-state" id="rage-name">Maiden's Grace</span>
    </div>
    <div class="rage-track">
      <div class="rage-fill" id="rage-fill" style="width:0%;background:#c9a84c;"></div>
    </div>
  </div>

  <!-- Hollow badge -->
  <div class="hollow-badge" id="hollow-badge">GONE HOLLOW &times;<span id="hollow-count">0</span></div>

  <div class="divider"></div>

  <!-- Boss section -->
  <div class="boss-section">
    <div class="boss-header">
      <span class="boss-label">Boss Progress</span>
      <span class="boss-count"><span id="bosses-defeated">0</span> / <span id="bosses-total">212</span></span>
    </div>
    <div class="boss-track">
      <div class="boss-fill" id="boss-fill" style="width:0%;"></div>
    </div>

    <!-- Mode: recent (default) -->
    <div class="boss-recent" id="mode-recent">
      <div id="recent-list"></div>
    </div>

    <!-- Mode: full list -->
    <div class="boss-full" id="mode-full" style="display:none;">
      <div id="full-list"></div>
    </div>

    <!-- Mode: count only — nothing extra -->

    <button class="mode-btn" id="mode-btn" onclick="cycleMode()">SHOW FULL LIST</button>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-label">Total Deaths</span>
    <span class="footer-value" id="total-deaths">0</span>
  </div>

</div>
<script>
  const POLL_MS = 1000;
  // 0=recent, 1=full, 2=count only
  let bossMode = parseInt(localStorage.getItem('bossMode') || '0');
  let lastList = [];
  const MODE_LABELS = ['SHOW FULL LIST', 'COUNT ONLY', 'SHOW RECENT KILLS'];

  function cycleMode() {
    bossMode = (bossMode + 1) % 3;
    localStorage.setItem('bossMode', bossMode);
    renderBosses(lastList);
  }

  function renderBosses(list) {
    const btn      = document.getElementById('mode-btn');
    const recent   = document.getElementById('mode-recent');
    const full     = document.getElementById('mode-full');
    btn.textContent = MODE_LABELS[bossMode];
    recent.style.display = bossMode === 0 ? 'block' : 'none';
    full.style.display   = bossMode === 1 ? 'block' : 'none';
    if (bossMode === 0) renderRecent(list);
    if (bossMode === 1) renderFull(list);
  }

  function renderRecent(list) {
    const defeated = list.filter(b => b.defeated).slice(-3).reverse();
    const el = document.getElementById('recent-list');
    if (!defeated.length) {
      el.innerHTML = '<div class="no-kills">No bosses defeated yet</div>';
    } else {
      el.innerHTML = defeated.map(b =>
        `<div class="recent-item">${b.name}</div>`
      ).join('');
    }
  }

  function renderFull(list) {
    const el = document.getElementById('full-list');
    const byRegion = {};
    list.forEach(b => (byRegion[b.location] = byRegion[b.location] || []).push(b));
    let html = '';
    for (const [region, bosses] of Object.entries(byRegion)) {
      html += `<div class="region-hdr">${region}</div>`;
      bosses.forEach(b => {
        const cls = b.defeated ? 'defeated' : 'alive';
        const tick = b.defeated ? '✓' : '–';
        html += `<div class="boss-item ${cls}"><span>${b.name}</span><span class="boss-tick">${tick}</span></div>`;
      });
    }
    el.innerHTML = html;
  }

  async function update() {
    try {
      const res = await fetch('stats.json?t=' + Date.now());
      const d = await res.json();
      const deaths = d.session_deaths;

      const deathEl = document.getElementById('session-deaths');
      deathEl.textContent = deaths;
      deathEl.className = 'death-number' + (deaths > 0 ? ' has-deaths' : '');

      document.getElementById('dph').textContent         = d.deaths_per_boss.toFixed(1);
      document.getElementById('timer').textContent       = d.elapsed;
      document.getElementById('rage-pct-val').textContent = d.rage_pct + '%';
      document.getElementById('rage-name').textContent   = d.rage_name;
      document.getElementById('rage-name').style.color  = d.rage_color;
      document.getElementById('rage-fill').style.width  = d.rage_pct + '%';
      document.getElementById('rage-fill').style.backgroundColor = d.rage_color;
      document.getElementById('rage-label').textContent = d.rage_label || 'Rage Index';
      document.getElementById('total-deaths').textContent = d.total_deaths;
      document.getElementById('bosses-defeated').textContent = d.bosses_defeated;
      document.getElementById('bosses-total').textContent    = d.bosses_total;

      const pct = d.bosses_total > 0 ? (d.bosses_defeated / d.bosses_total * 100).toFixed(1) : 0;
      document.getElementById('boss-fill').style.width = pct + '%';

      // Hollow state
      const panel  = document.getElementById('panel');
      const hollow = document.getElementById('hollow-badge');
      if (d.is_hollow) {
        panel.classList.add('hollow');
        if (d.hollow_streak > 0) {
          hollow.classList.add('visible');
          document.getElementById('hollow-count').textContent = d.hollow_streak;
        }
      } else {
        panel.classList.remove('hollow');
        hollow.classList.remove('visible');
      }

      // Status pill
      const dot  = document.getElementById('status-dot');
      const txt  = document.getElementById('status-text');
      dot.className = 'status-dot' + (d.session_active ? ' active' : '');
      txt.textContent = d.session_active ? 'LIVE' : 'OFFLINE';

      lastList = d.boss_list || [];
      renderBosses(lastList);
    } catch(e) {}
    setTimeout(update, POLL_MS);
  }

  update();
</script>
</body>
</html>
